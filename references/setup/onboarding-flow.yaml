onboarding_flow:
  entry:
    title: University Application Setup
    prompt: Choose what you want to do now.
    field: workflow_mode
    control: single_choice
    options:
      - quick_triage
      - full_shortlist
      - exact_program_selection
      - requirement_audit
      - essay_sop
      - materials_check
      - workbook_build
      - programme_table_cleaning
      - submission_readiness
      - source_refresh
      - visa_readiness

  output_mode:
    title: Output reliability
    prompt: Choose how strict the source and validation requirements should be.
    field: output_mode
    control: single_choice
    options:
      - brainstorm
      - draft
      - source_backed
      - verified

  cards:
    workflow_goal:
      fields:
        - workflow_mode
        - output_mode
        - preferred_depth
        - ask_style
    target_shape:
      fields:
        - target_degree_level
        - target_intake
        - target_countries
        - target_field
    identity_route:
      fields:
        - citizenship_countries
        - residence_country
        - passport_country
        - education_country
        - visa_application_country
    academic_profile:
      fields:
        - current_institution
        - current_major
        - gpa_value
        - gpa_scale
        - language_status
        - core_courses
    budget_preferences:
      fields:
        - budget_annual
        - ranking_weight
        - admission_safety_weight
        - budget_weight
        - city_weight
        - career_weight
        - research_fit_weight
        - visa_work_route_weight
        - deadline_feasibility_weight
    privacy_export:
      fields:
        - privacy_mode
        - export_format
    programme_table_cleaning:
      fields:
        - source_workbook_dir_or_files
        - cleaned_output_dir
        - copy_back_requested
    application_case:
      fields:
        - program_name_or_url
        - application_cycle
    writing_brief:
      fields:
        - program_name
        - prompt
        - word_limit
        - character_limit
        - audience
        - intended_use
        - output_location
        - overwrite_existing
        - applicant_background
        - revision_decision_ledger
        - writing_revision_items
    materials_inventory:
      fields:
        - document_inventory
        - application_materials
        - documents
    status_diagnostics:
      output_only: true
      fields:
        - can_do
        - cannot_do
        - blockers
        - warnings
        - next_questions

  routes:
    quick_triage:
      required_cards:
        - workflow_goal
        - target_shape
      gate: quick_triage
    full_shortlist:
      required_cards:
        - workflow_goal
        - target_shape
        - privacy_export
      gate: full_shortlist
    exact_program_selection:
      required_cards:
        - workflow_goal
        - target_shape
      gate: exact_program_selection
    requirement_audit:
      required_cards:
        - workflow_goal
        - application_case
      gate: requirement_audit
    essay_sop:
      required_cards:
        - workflow_goal
        - application_case
        - writing_brief
      gate: essay_sop
    materials_check:
      required_cards:
        - workflow_goal
        - application_case
        - materials_inventory
      gate: materials_check
    workbook_build:
      required_cards:
        - workflow_goal
        - privacy_export
      gate: workbook_build
    programme_table_cleaning:
      required_cards:
        - workflow_goal
        - programme_table_cleaning
        - privacy_export
      gate: programme_table_cleaning
    submission_readiness:
      required_cards:
        - workflow_goal
        - application_case
        - materials_inventory
      gate: submission_readiness
    source_refresh:
      required_cards:
        - workflow_goal
      gate: source_refresh
    visa_readiness:
      required_cards:
        - workflow_goal
        - identity_route
      gate: visa_readiness
