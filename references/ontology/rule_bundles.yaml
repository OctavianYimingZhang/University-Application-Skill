rule_bundles:
  generic_international:
    purpose: common origin/destination decomposition
    required_profile_fields:
      - citizenship_countries
      - residence_country
      - education_country
      - passport_country
      - document_language
      - funding_source_country
      - visa_application_country
      - prior_residence_history
    default_tasks:
      - verify_application_route
      - verify_language_policy
      - verify_document_translation_or_legalisation
      - verify_funding_evidence

  us:
    route_families:
      - common_app
      - coalition
      - university_portal
      - sevp_i20_f1_m1
    post_offer_dependencies:
      - i20
      - sevis_fee
      - ds160
      - embassy_interview
    verification_sources:
      - official_application_system
      - official_program_page
      - government_visa_page

  uk:
    route_families:
      - ucas
      - university_portal
      - atas_if_sensitive_subject
      - student_visa
    conditional_rule_templates:
      - tb_test_by_residence_history
      - atas_by_subject_and_citizenship
      - money_by_location_duration_and_fee
      - cas_after_offer
    verification_sources:
      - official_application_system
      - official_program_page
      - government_visa_page

  canada:
    route_families:
      - institution_application
      - dli_loa
      - pal_tal_or_caq_if_required
      - study_permit
    conditional_rule_templates:
      - province_specific_attestation
      - quebec_caq
      - local_visa_office_documents
    verification_sources:
      - official_program_page
      - government_visa_page
      - provincial_government_page

  australia:
    route_families:
      - provider_application
      - coe
      - subclass_500
    conditional_rule_templates:
      - genuine_student_evidence
      - financial_capacity
      - health_and_biometrics
    verification_sources:
      - official_program_page
      - government_visa_page

  germany:
    route_families:
      - direct_application
      - uni_assist
      - vpd_then_direct
      - hochschulstart
      - student_visa_or_residence_permit
    conditional_rule_templates:
      - credential_equivalence
      - blocked_account_or_funding
      - aps_or_country_specific_documents
    verification_sources:
      - official_program_page
      - official_application_system
      - government_visa_page

  netherlands:
    route_families:
      - studielink
      - institution_application
      - institution_led_residence_permit
    conditional_rule_templates:
      - mvv_or_residence_permit_by_citizenship
      - proof_of_income
      - accepted_document_languages
    verification_sources:
      - official_program_page
      - official_application_system
      - government_visa_page

  sweden:
    route_families:
      - universityadmissions_se
      - ranked_choices
      - tuition_fee_if_non_eu_eea
      - residence_permit
    conditional_rule_templates:
      - application_fee_by_citizenship
      - tuition_fee_by_citizenship
      - passport_presentation
      - biometrics
    verification_sources:
      - official_application_system
      - government_visa_page

rule_policy:
  - Do not hardcode current fee amounts, money thresholds, exact dates, or country lists in final answers unless live official evidence was checked during the task.
  - Version each rule with checked_at, valid_from, valid_until, stale_after_days, and verification_status.
  - If destination country, citizenship, residence, education country, or route is missing, create a blocking route-resolution task.
