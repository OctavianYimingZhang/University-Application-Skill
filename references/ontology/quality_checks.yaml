quality_checks:
  no_verified_requirement_without_source:
    target: RequirementRule
    severity: blocker
    logic: verification_status == "verified" implies source_evidence_id exists and resolves to SourceEvidence
    on_fail: abort_output

  no_deadline_without_timezone:
    target: Deadline
    severity: blocker
    logic: due_at is empty or timezone exists
    on_fail: block_state_transition

  no_submitted_case_with_open_blockers:
    target: ApplicationCase
    severity: blocker
    logic: status != "submitted" or no Task for same application_case_id has status in [blocked, not_started]
    on_fail: block_state_transition

  no_verified_program_fit_without_source:
    target: ProgramFitFact
    severity: error
    logic: verification_status != "verified" or source_evidence_id exists and resolves to SourceEvidence
    on_fail: abort_output

  no_approved_essay_claim_without_evidence:
    target: EssayClaim
    severity: error
    logic: status != "approved" or student_evidence_ids and program_fit_fact_ids are non-empty and resolve
    on_fail: abort_output

  source_staleness_check:
    target: SourceEvidence
    severity: warning
    logic: checked_at + stale_after_days >= today
    on_fail: warn

  no_verified_output_from_raw_source:
    target: LineageEdge
    severity: error
    logic: verified output lineage must pass through ExtractedFact and a verified Gold object
    on_fail: abort_output

  route_rules_are_conditional:
    target: RequirementRule
    severity: warning
    logic: route and visa rules should include applies_when conditions over applicant and route attributes
    on_fail: create_task

  valid_user_setup_mode:
    target: UserSetup
    severity: error
    logic: workflow_mode and output_mode must match references/setup/user-setup.schema.json
    on_fail: abort_output

  task_gate_required_fields_present:
    target: UserSetup
    severity: error
    logic: selected workflow_mode must satisfy the required fields in references/setup/task-gates.yaml before gated output
    on_fail: abort_output
