workflow_gates:
  ProfileCompletenessGate:
    before_state: intake
    required:
      - target_degree_level
      - target_intake
      - target_countries
      - citizenship_countries
      - residence_country
      - education_country
      - passport_country
      - GPA_or_equivalent_profile
      - budget
      - language_status
      - document_availability
    on_fail:
      - ask only for missing fields
      - do not recommend schools
      - create collect_info tasks

  RouteResolutionGate:
    before_state: requirements_verified
    required:
      - destination_country
      - degree_level
      - institution_application_system_or_official_route
      - source_evidence_id_for_route
    on_fail:
      - set ApplicationCase.route to needs_official_check
      - create resolve_route task
      - do not generate final checklist

  RequirementVerificationGate:
    before_state: shortlisted
    every_requirement_must_have:
      - requirement_rule_id
      - source_evidence_id
      - checked_at
      - source_type
      - verification_status
    allowed_verified_source_types:
      - official_program_page
      - official_admissions_page
      - official_application_system
      - government_visa_page
      - test_provider
      - ranking_provider
      - peer_reviewed
      - textbook
    on_fail:
      - mark requirement as needs_official_check
      - create verify_source task

  SubmissionReadinessGate:
    before_state: submitted
    checks:
      - program_name_matches_official
      - campus_matches_official
      - intake_matches_official
      - deadline_timezone_confirmed
      - all_mandatory_requirements_verified
      - all_required_documents_received_or_uploaded
      - documents_final_pdf_where_required
      - passport_name_matches
      - grades_match_transcript
      - recommender_links_sent
      - fee_ready
      - source_log_complete
    on_fail:
      - keep ApplicationCase.status as materials_preparing
      - create blocking task and risk flag

  OfferAndDepositGate:
    before_state: offer_received
    required:
      - official_decision_or_portal_evidence
      - conditions_recorded
      - deposit_deadline_if_any
      - post_offer_document_dependency
    on_fail:
      - create verify_offer_conditions task

  VisaWorkflowGate:
    before_state: visa_preparing
    required:
      - destination_country
      - citizenship_countries
      - residence_country
      - passport_country
      - post_offer_document_route
      - government_source_evidence
    on_fail:
      - create route-resolution or source-verification task
      - do not mark visa workflow complete

  MonitoringGate:
    before_state: closed
    required:
      - decision_or_withdrawal_status
      - outstanding_tasks_closed_or_transferred
      - source_conflicts_recorded
      - final_document_versions_recorded
