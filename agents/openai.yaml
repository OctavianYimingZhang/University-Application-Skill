interface:
  display_name: "University Application Skill"
  short_description: "Route source-backed university applications"
  default_prompt: "Use $university-application-index to route and complete a source-backed university application task in English."
multi_skill_system:
  plugin_router_skill: "skills/university-application-index/SKILL.md"
  compatibility_aliases:
    - "study-abroad-advisor"
  index_skill: "skills/university-application-index/SKILL.md"
  focused_skills:
    - "university-application-index"
    - "program-research"
    - "requirement-audit"
    - "materials-check"
    - "application-writing-studio"
    - "submission-readiness"
    - "visa-readiness"
    - "programme-table-cleaning"
source_policy:
  hard_requirements: "official_only"
  probability_prediction: "prohibited"
  applicant_evidence_contract: "references/evidence-contract.md"
  programme_identity_catalogue: "catalogues/index.json; official-source-listed identity only; requirements not collected"
  default_output_language: "en"
