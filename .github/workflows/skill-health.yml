name: Skill health

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate Plugin
        run: |
          python3 -m compileall -q scripts
          python3 scripts/validate_catalogues.py
          python3 -m unittest tests.test_catalogues -v
          python3 scripts/validate_evidence.py --self-test
          python3 scripts/publish_skill.py --self-test
          python3 scripts/validate_skill_contracts.py
          python3 scripts/publish_skill.py --install-root "$RUNNER_TEMP/codex-skills" --sync-local-skill
          python3 scripts/publish_skill.py --install-root "$RUNNER_TEMP/codex-skills" --check-installed
