views:
  ApplicantView:
    source_objects:
      - Applicant
      - EducationCredential
      - DocumentArtifact
    purpose: show profile completeness and missing intake fields

  SetupProgressView:
    source_objects:
      - UserSetup
      - PreferenceWeight
      - InteractionState
      - Task
      - QualityCheck
    purpose: show selected workflow mode, output reliability, setup completeness, blockers, allowed outputs, and next questions

  ShortlistView:
    source_objects:
      - ApplicationCase
      - Program
      - Institution
      - RiskFlag
      - SourceEvidence
    purpose: compare reach, target, and safer options with source-backed fit notes

  ProgramComparisonView:
    source_objects:
      - Program
      - Institution
      - RequirementRule
      - SourceEvidence
    purpose: compare exact programs, curriculum, fees, routes, and requirements

  RequirementMatrixView:
    source_objects:
      - RequirementRule
      - DocumentArtifact
      - SourceEvidence
    purpose: show verified, stale, conflicting, and needs-check requirements

  DocumentGapView:
    source_objects:
      - DocumentArtifact
      - RequirementRule
      - Task
    purpose: show missing, expired, untranslated, unverified, uploaded, and submitted documents

  SubmissionTaskView:
    source_objects:
      - Task
      - ApplicationCase
      - Deadline
      - RiskFlag
    purpose: show critical path, blockers, owners, due times, and time zones

  VisaRouteView:
    source_objects:
      - OfferDecision
      - VisaImmigrationCase
      - RequirementRule
      - DocumentArtifact
      - SourceEvidence
    purpose: show post-offer document dependency and visa/residence-permit readiness

  SourceLogView:
    source_objects:
      - SourceEvidence
      - SourceSnapshot
      - ExtractedFact
      - FactVersion
    purpose: audit every material fact, checked date, source type, stale-after period, and supported facts

  LineageAuditView:
    source_objects:
      - LineageEdge
      - QualityCheck
      - PipelineRun
      - ActionEvent
    purpose: audit how raw snapshots became verified objects, rendered workbook rows, essay claims, tasks, and risk flags

workbook_policy:
  - Render views from ontology objects.
  - Preserve legacy workbook sheets for compatibility.
  - Never treat a workbook cell as verified unless the backing object has SourceEvidence and verification_status is verified.
  - Prefer declarative view dependencies and freshness rules from view_definitions.yaml for final outputs.
  - Preserve LineageEdge references for every final recommendation, checklist item, and essay claim.
