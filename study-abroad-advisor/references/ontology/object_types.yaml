object_types:
  Applicant:
    primary_key: applicant_id
    required:
      - applicant_id
      - citizenship_countries
      - residence_country
      - education_country
      - passport_country
      - target_degree_level
      - target_intake
      - target_countries
    properties:
      legal_name_passport: string
      preferred_name: string
      date_of_birth: date
      citizenship_countries: list[string]
      residence_country: string
      education_country: string
      passport_country: string
      dual_citizenship: boolean
      visa_application_country: string
      document_language: string
      funding_source_country: string
      prior_residence_history: list[string]
      target_degree_level: enum[undergraduate, taught_master, research_master, phd, transfer, exchange, foundation, premaster]
      target_intake: string
      target_countries: list[string]
      budget_total: money
      budget_annual: money
      career_or_research_goal: string
      risk_tolerance: enum[ambitious, balanced, conservative]
      data_completeness_status: enum[incomplete, usable, verified]

  EducationCredential:
    primary_key: credential_id
    properties:
      credential_id: string
      applicant_id: ref[Applicant]
      country: string
      institution: string
      qualification_type: string
      major: string
      start_date: date
      end_date: date
      expected_graduation_date: date
      gpa_value: string
      gpa_scale: string
      class_rank: string
      grading_evidence_document_id: ref[DocumentArtifact]
      language_of_instruction: string
      status: enum[completed, in_progress, predicted]

  Institution:
    primary_key: institution_id
    properties:
      institution_id: string
      name_official: string
      country: string
      city: string
      campus_list: list[string]
      institution_type: enum[university, college, university_of_applied_sciences, pathway_provider]
      application_systems: list[ref[ApplicationSystem]]
      visa_sponsor_status: string
      dli_number: string
      recognised_sponsor_status: string
      source_evidence_ids: list[ref[SourceEvidence]]

  Program:
    primary_key: program_id
    properties:
      program_id: string
      institution_id: ref[Institution]
      official_name: string
      award: string
      degree_level: enum[undergraduate, taught_master, research_master, phd, transfer, exchange, foundation, premaster]
      subject_area: string
      campus: string
      duration: string
      mode: enum[full_time, part_time, online, hybrid]
      intake_terms: list[string]
      application_route: string
      tuition_fee: money
      deadline_set_id: ref[Deadline]
      source_evidence_ids: list[ref[SourceEvidence]]
      verification_status: enum[unverified, verified, stale, conflict, needs_official_check]

  ApplicationCase:
    primary_key: application_case_id
    properties:
      application_case_id: string
      applicant_id: ref[Applicant]
      program_id: ref[Program]
      cycle: string
      intake: string
      route: enum[ucas, common_app, coalition, university_portal, studielink, universityadmissions_se, uni_assist, vpd_then_direct, ircc_study_permit, immiaccount, other, needs_official_check]
      status: enum[intake, researching, route_unresolved, requirements_verified, shortlisted, materials_preparing, submitted, awaiting_decision, offer_received, rejected, visa_preparing, visa_submitted, closed]
      fit_category: enum[reach, target, safer, unclassified]
      academic_fit: string
      budget_fit: string
      timing_fit: string
      visa_work_fit: string
      risk_summary: string
      last_verified_at: date

  RequirementRule:
    primary_key: requirement_rule_id
    properties:
      requirement_rule_id: string
      application_case_id: ref[ApplicationCase]
      jurisdiction: string
      institution_id: ref[Institution]
      program_id: ref[Program]
      rule_category: enum[academic, language, document, deadline, fee, application_route, credential_evaluation, visa, funding, health, work_rights, post_study]
      applies_when: object
      requirement_text: string
      required_document_type: string
      source_evidence_id: ref[SourceEvidence]
      checked_at: date
      valid_from: date
      valid_until: date
      stale_after_days: int
      verification_status: enum[verified, stale, conflict, needs_official_check]

  DocumentArtifact:
    primary_key: document_id
    properties:
      document_id: string
      applicant_id: ref[Applicant]
      document_type: enum[passport, transcript, degree_certificate, enrollment_certificate, grading_scale, language_score, cv, sop, recommendation, portfolio, bank_statement, scholarship_letter, tb_certificate, atas_certificate, i20, cas, coe, loa, pal_tal, caq, vpd, other]
      issuing_country: string
      language: string
      translation_required: boolean
      legalisation_required: boolean
      version: string
      status: enum[missing, requested, received, verified, uploaded, submitted, expired]
      expiry_date: date
      linked_requirement_ids: list[ref[RequirementRule]]

  SourceEvidence:
    primary_key: source_evidence_id
    properties:
      source_evidence_id: string
      source_type: enum[official_program_page, official_admissions_page, official_application_system, government_visa_page, test_provider, ranking_provider, peer_reviewed, textbook, unverified]
      title: string
      publisher: string
      url: string
      facts_supported: list[string]
      checked_at: date
      retrieved_at: datetime
      reliability: enum[primary, official, secondary, unverified]
      stale_after_days: int
      quote_or_excerpt: string

  Task:
    primary_key: task_id
    properties:
      task_id: string
      application_case_id: ref[ApplicationCase]
      task_type: enum[collect_info, verify_source, resolve_route, request_document, draft_essay, submit_portal, pay_fee, invite_recommender, order_test_score, accept_offer, pay_deposit, apply_visa, book_biometrics, pre_arrival, monitor]
      owner: enum[student, advisor, recommender, institution, system]
      due_at: datetime
      timezone: string
      status: enum[not_started, blocked, in_progress, waiting_external, complete, cancelled]
      blocking_requirement_ids: list[ref[RequirementRule]]
      evidence_required: boolean

  RiskFlag:
    primary_key: risk_id
    properties:
      risk_id: string
      application_case_id: ref[ApplicationCase]
      category: enum[academic, budget, deadline, visa, document, source_conflict, fit, route]
      severity: enum[low, medium, high, blocker]
      rationale: string
      evidence_id: ref[SourceEvidence]
      status: enum[open, mitigated, accepted, closed]

  Deadline:
    primary_key: deadline_id
    properties:
      deadline_id: string
      application_case_id: ref[ApplicationCase]
      deadline_type: enum[application, scholarship, document, test_score, deposit, visa, residence_permit, arrival]
      due_at: datetime
      timezone: string
      source_evidence_id: ref[SourceEvidence]
      verification_status: enum[verified, stale, conflict, needs_official_check]

  OfferDecision:
    primary_key: offer_id
    properties:
      offer_id: string
      application_case_id: ref[ApplicationCase]
      decision: enum[offer, conditional_offer, waitlist, reject, withdrawn, unknown]
      conditions: list[string]
      deposit_due_at: datetime
      post_offer_document_type: enum[cas, i20, coe, loa, pal_tal, caq, vpd, none, other]
      source_evidence_id: ref[SourceEvidence]

  VisaImmigrationCase:
    primary_key: visa_case_id
    properties:
      visa_case_id: string
      application_case_id: ref[ApplicationCase]
      destination_country: string
      visa_or_permit_type: string
      route_status: enum[not_started, route_unresolved, preparing, submitted, approved, refused, closed]
      post_offer_document_id: ref[DocumentArtifact]
      required_document_ids: list[ref[DocumentArtifact]]
      source_evidence_ids: list[ref[SourceEvidence]]
