action_types:
  ConfigureUserSetup:
    inputs:
      user_setup_candidate: object
    logic:
      - capture workflow_mode, output_mode, ask_style, source_policy, privacy_mode, and export_format
      - create or update UserSetup
      - create or update PreferenceWeight when ranking, safety, budget, city, career, research, visa/work, or deadline weights are provided
      - create or update InteractionState with completed cards, missing fields, blockers, warnings, and next recommended action
      - run scripts/validate_setup.py when setup JSON is available
    validations:
      - workflow_mode and output_mode must be valid enum values
      - task-scoped gate missing fields must be reported before verified output

  DiagnoseAdmissionsCase:
    inputs:
      ontology_json_path: string
      user_setup_json_path: string
    logic:
      - run scripts/doctor_admissions_case.py
      - combine setup validation, task-scoped gates, and ontology quality checks
      - report can_do, cannot_do, blockers, warnings, and next_questions
      - do not advance workflow state directly
    validations:
      - diagnosis output is advisory unless a separate controlled action updates ontology state

  ResolveApplicationRoute:
    inputs:
      applicant_id: ref[Applicant]
      program_id: ref[Program]
    logic:
      - inspect destination country, degree level, institution application systems, citizenship, residence, and education country
      - search official application-system or institution route evidence
      - create or update ApplicationCase.route
      - create route-specific Task objects
      - attach candidate RequirementRule objects
      - create ActionEvent with before_state, after_state, validations, and source evidence
    validations:
      - must_have_source_evidence_for_route
    blocked_output:
      - set route to needs_official_check
      - create blocking route-verification Task

  VerifyRequirement:
    inputs:
      application_case_id: ref[ApplicationCase]
      requirement_candidate: object
      source_evidence_id: ref[SourceEvidence]
    logic:
      - validate source type and checked date
      - attach source evidence
      - set valid_from, stale_after_days, and verification status
      - create RequirementRule
      - link Program to RequirementRule
      - create LineageEdge from SourceEvidence or ExtractedFact to RequirementRule
      - create ActionEvent for the verified or blocked update
    validations:
      - source_type must be official, government, application_system, test_provider, ranking_provider, peer_reviewed, or textbook as appropriate
      - unverified sources cannot produce verified requirements

  CreateDocumentChecklist:
    inputs:
      application_case_id: ref[ApplicationCase]
    logic:
      - read verified RequirementRule objects
      - map required document types to DocumentArtifact objects
      - create missing DocumentArtifact placeholders
      - create request_document Task objects
      - create ActionEvent for generated checklist objects
    validations:
      - cannot include unverified requirement as final

  MarkDocumentVerified:
    inputs:
      document_id: ref[DocumentArtifact]
      source_evidence_id: ref[SourceEvidence]
    logic:
      - confirm document identity, language, expiry, version, and linked requirement
      - set DocumentArtifact.status to verified
      - create ActionEvent for document state transition
    validations:
      - required translations and legalisation must be resolved

  MarkApplicationSubmitted:
    inputs:
      application_case_id: ref[ApplicationCase]
      submitted_at: datetime
      confirmation_number: string
    logic:
      - run submission readiness gate
      - set ApplicationCase.status to submitted
      - create monitoring Task objects
      - create ActionEvent for submission state transition
    validations:
      - all mandatory requirements verified
      - all required documents uploaded or submitted
      - deadline and timezone confirmed
      - source log complete

  TriggerVisaWorkflow:
    inputs:
      application_case_id: ref[ApplicationCase]
      offer_id: ref[OfferDecision]
    logic:
      - identify post-offer document dependency
      - create VisaImmigrationCase
      - attach destination-country rule bundle candidates
      - create visa document and appointment tasks
      - create ActionEvent for visa workflow creation
    validations:
      - offer or post-offer document route must be official or needs_official_check

  RefreshPolicySource:
    inputs:
      source_evidence_id: ref[SourceEvidence]
    logic:
      - re-open official source
      - create SourceSnapshot with content hash and retrieval metadata
      - compare ExtractedFact values against prior snapshots
      - create FactVersion records for new, changed, removed, or unchanged facts
      - update checked_at, stale_after_days, and verification status only after review
      - create conflict RiskFlag if source changed or contradicts another source
      - create ActionEvent for refresh outcome

  ValidateOntology:
    inputs:
      ontology_json_path: string
    logic:
      - run scripts/validate_ontology.py
      - emit JSON report
      - create PipelineRun and QualityCheck objects when structured output is being persisted
    validations:
      - blocker or error findings prevent verified output
