view_definitions:
  RequirementMatrixView:
    source_objects:
      - ApplicationCase
      - RequirementRule
      - DocumentArtifact
      - SourceEvidence
    dependencies:
      - ApplicationCase.application_case_id
      - RequirementRule.application_case_id
      - RequirementRule.source_evidence_id
    freshness_policy:
      max_age_days:
        deadline: 7
        fee: 14
        visa: 7
        curriculum: 90
    materialization:
      renderer: workbook
      sheet_name: Requirement Matrix
    blocking_conditions:
      - no_verified_requirement_without_source
      - no_deadline_without_timezone
      - no_final_checklist_if_route_unresolved

  ShortlistView:
    source_objects:
      - Applicant
      - ApplicationCase
      - Program
      - Institution
      - RiskFlag
      - SourceEvidence
    dependencies:
      - ApplicationCase.program_id
      - Program.institution_id
      - RiskFlag.application_case_id
    materialization:
      renderer: workbook
      sheet_name: School Shortlist
    blocking_conditions:
      - profile_completeness
      - route_resolution

  EssayPlanView:
    source_objects:
      - ApplicationCase
      - StudentEvidence
      - ProgramFitFact
      - EssayClaim
      - SourceEvidence
    materialization:
      renderer: workbook
      sheet_name: Essay Plan
    blocking_conditions:
      - no_approved_essay_claim_without_evidence
